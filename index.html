<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BodyTrack Pro | Ricardo's Club</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase (Versión más compatible para index.html) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .nav-active { color: #2563eb; transform: scale(1.1); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root">
        <!-- Loader inicial por si tarda en cargar -->
        <div class="h-screen flex items-center justify-center bg-slate-900">
            <div class="text-center">
                <div class="w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-yellow-500 font-bold uppercase tracking-widest text-xs">Cargando BodyTrack Pro...</p>
            </div>
        </div>
    </div>

    <script type="text/babel">
        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCZVlrXMmFVaN1SfG4VZq1JLnvbRhzhGDc",
            authDomain: "body-track-3ff2b.firebaseapp.com",
            projectId: "body-track-3ff2b",
            storageBucket: "body-track-3ff2b.firebasestorage.app",
            messagingSenderId: "147768216670",
            appId: "1:147768216670:web:d25a81b41a60b99121f8cf"
        };

        // Inicializar Firebase (Modo Compat para mayor estabilidad en script único)
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'body-track-3ff2b';

        // Lógica de Diagnóstico (Tablas de Ricardo)
        const getBodyFatStatus = (value, age, gender) => {
            const v = parseFloat(value);
            const isMale = gender === 'Masculino';
            if (age < 30) {
                if (isMale) {
                    if (v < 7) return { label: 'Bajo', color: 'text-blue-500' };
                    if (v <= 11) return { label: 'Fitness', color: 'text-green-500' };
                    if (v <= 18) return { label: 'Aceptable', color: 'text-emerald-500' };
                    if (v <= 21) return { label: 'Sobrepeso M.', color: 'text-yellow-500' };
                    return { label: 'Obesidad', color: 'text-red-500' };
                } else {
                    if (v < 10) return { label: 'Bajo', color: 'text-blue-500' };
                    if (v <= 14) return { label: 'Fitness', color: 'text-green-500' };
                    if (v <= 21) return { label: 'Aceptable', color: 'text-emerald-500' };
                    if (v <= 24) return { label: 'Sobrepeso M.', color: 'text-yellow-500' };
                    return { label: 'Obesidad', color: 'text-red-500' };
                }
            } else {
                if (isMale) {
                    if (v < 5) return { label: 'Bajo', color: 'text-blue-500' };
                    if (v <= 13) return { label: 'Fitness', color: 'text-green-500' };
                    if (v <= 23) return { label: 'Aceptable', color: 'text-emerald-500' };
                    if (v <= 26) return { label: 'Sobrepeso M.', color: 'text-yellow-500' };
                    return { label: 'Obesidad', color: 'text-red-500' };
                } else {
                    if (v < 13) return { label: 'Bajo', color: 'text-blue-500' };
                    if (v <= 16) return { label: 'Fitness', color: 'text-green-500' };
                    if (v <= 26) return { label: 'Aceptable', color: 'text-emerald-500' };
                    if (v <= 29) return { label: 'Sobrepeso M.', color: 'text-yellow-500' };
                    return { label: 'Obesidad', color: 'text-red-500' };
                }
            }
        };

        const getVisceralStatus = (value) => {
            const v = parseInt(value);
            if (v <= 9) return { label: 'Normal', color: 'text-emerald-500' };
            if (v <= 14) return { label: 'Alto', color: 'text-orange-500' };
            return { label: 'Muy Alto', color: 'text-red-600' };
        };

        const getMuscleStatus = (value, age, gender) => {
            const v = parseFloat(value);
            const isMale = gender === 'Masculino';
            const threshold = isMale ? (age <= 39 ? 33.3 : 33.1) : (age <= 39 ? 24.3 : 24.1);
            const highLimit = isMale ? (age <= 39 ? 39.3 : 39.1) : (age <= 39 ? 30.3 : 30.1);
            if (v < threshold) return { label: 'Bajo', color: 'text-red-400' };
            if (v <= highLimit) return { label: 'Normal', color: 'text-emerald-500' };
            return { label: 'Alto', color: 'text-blue-500' };
        };

        // Componente Icono
        const Icon = ({ name, size = 24, className = "" }) => {
            React.useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [user, setUser] = React.useState(null);
            const [view, setView] = React.useState('dashboard');
            const [clients, setClients] = React.useState([]);
            const [selectedClient, setSelectedClient] = React.useState(null);
            const [searchTerm, setSearchTerm] = React.useState('');

            React.useEffect(() => {
                auth.signInAnonymously().catch(e => console.error("Auth Error", e));
                return auth.onAuthStateChanged(setUser);
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const clientsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('clients');
                return clientsRef.onSnapshot(snap => {
                    setClients(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, [user]);

            const Dashboard = () => (
                <div className="p-4 space-y-6">
                    <header className="bg-slate-900 text-white p-7 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                        <div className="relative z-10">
                            <h1 className="text-2xl font-black italic tracking-tighter">BodyTrack Pro 🎸</h1>
                            <p className="text-yellow-500 text-[10px] font-bold uppercase tracking-widest">Ricardo's Training Club</p>
                        </div>
                        <div className="absolute top-[-20px] right-[-20px] opacity-10 rotate-12">
                            <Icon name="activity" size={120} />
                        </div>
                    </header>
                    <div className="grid grid-cols-2 gap-4">
                        <button onClick={() => setView('clients')} className="p-6 bg-white rounded-3xl border border-slate-100 flex flex-col items-center shadow-sm active:scale-95 transition">
                            <Icon name="users" className="text-blue-600 mb-2" />
                            <span className="font-bold text-slate-700">Clientes</span>
                            <span className="text-[10px] text-slate-400 uppercase font-bold">{clients.length} Total</span>
                        </button>
                        <button onClick={() => setView('new-client')} className="p-6 bg-white rounded-3xl border border-slate-100 flex flex-col items-center shadow-sm active:scale-95 transition">
                            <Icon name="user-plus" className="text-green-600 mb-2" />
                            <span className="font-bold text-slate-700">Nuevo</span>
                            <span className="text-[10px] text-slate-400 uppercase font-bold">Registro</span>
                        </button>
                    </div>
                    <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                        <h2 className="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <Icon name="trending-up" size={18} className="text-indigo-500" />
                            Actividad Reciente
                        </h2>
                        <div className="space-y-3">
                            {clients.slice(0, 3).map(c => (
                                <div key={c.id} className="p-4 bg-slate-50 rounded-2xl flex justify-between items-center">
                                    <span className="font-bold text-slate-700">{c.name}</span>
                                    <Icon name="chevron-right" size={16} className="text-slate-300" />
                                </div>
                            ))}
                            {clients.length === 0 && <p className="text-center text-slate-400 text-sm py-4 italic">No hay clientes registrados.</p>}
                        </div>
                    </div>
                </div>
            );

            const ClientList = () => (
                <div className="p-4 space-y-4">
                    <div className="flex items-center gap-3">
                        <button onClick={() => setView('dashboard')} className="p-2 bg-white rounded-full border shadow-sm"><Icon name="arrow-left" /></button>
                        <h2 className="text-xl font-bold">Directorio</h2>
                    </div>
                    <div className="relative">
                        <Icon name="search" className="absolute left-4 top-4 text-slate-400" size={18} />
                        <input placeholder="Buscar por nombre..." className="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl outline-none shadow-sm focus:ring-2 focus:ring-blue-500" 
                            value={searchTerm} onChange={e => setSearchTerm(e.target.value)} />
                    </div>
                    <div className="space-y-3">
                        {clients.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase())).map(c => (
                            <div key={c.id} onClick={() => { setSelectedClient(c); setView('history'); }} className="p-5 bg-white rounded-3xl border border-slate-100 flex justify-between items-center active:scale-95 transition cursor-pointer shadow-sm">
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-slate-900 text-white rounded-2xl flex items-center justify-center font-bold">{c.name.charAt(0)}</div>
                                    <div>
                                        <h3 className="font-bold text-slate-800">{c.name}</h3>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase">{c.gender} • {c.age} años</p>
                                    </div>
                                </div>
                                <Icon name="chevron-right" className="text-slate-200" />
                            </div>
                        ))}
                    </div>
                </div>
            );

            const NewClientForm = () => (
                <div className="p-4 space-y-4">
                    <button onClick={() => setView('dashboard')} className="p-2"><Icon name="arrow-left" /></button>
                    <h2 className="text-xl font-bold px-2">Registro de Miembro</h2>
                    <form className="space-y-4 bg-white p-6 rounded-3xl border border-slate-100 shadow-xl" onSubmit={async (e) => {
                        e.preventDefault();
                        const d = new FormData(e.target);
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('clients').add({
                            name: d.get('name'), age: d.get('age'), gender: d.get('gender'), createdAt: new Date().toISOString()
                        });
                        setView('clients');
                    }}>
                        <input name="name" required placeholder="Nombre Completo" className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500" />
                        <div className="grid grid-cols-2 gap-4">
                            <input name="age" required type="number" placeholder="Edad" className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none" />
                            <select name="gender" className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none">
                                <option value="Masculino">Masculino</option>
                                <option value="Femenino">Femenino</option>
                            </select>
                        </div>
                        <button className="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold shadow-lg active:scale-95 transition">Guardar Cliente</button>
                    </form>
                </div>
            );

            const HistoryView = () => {
                const [records, setRecords] = React.useState([]);
                React.useEffect(() => {
                    const q = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('clients').doc(selectedClient.id).collection('assessments');
                    return q.onSnapshot(s => setRecords(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => new Date(b.date) - new Date(a.date))));
                }, []);

                return (
                    <div className="p-4 space-y-6">
                        <div className="flex items-center justify-between">
                            <button onClick={() => setView('clients')} className="p-2 bg-white rounded-full border"><Icon name="arrow-left" /></button>
                            <div className="text-center">
                                <h2 className="font-bold text-slate-800 leading-none">{selectedClient.name}</h2>
                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Historial</span>
                            </div>
                            <button onClick={() => setView('assessment')} className="bg-blue-600 text-white p-3 rounded-2xl shadow-lg active:scale-90 transition"><Icon name="plus" size={20}/></button>
                        </div>
                        <div className="space-y-4">
                            {records.map(r => {
                                const fat = getBodyFatStatus(r.fat, selectedClient.age, selectedClient.gender);
                                const visc = getVisceralStatus(r.visceral);
                                const musc = getMuscleStatus(r.muscle, selectedClient.age, selectedClient.gender);
                                return (
                                    <div key={r.id} className="bg-white p-5 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
                                        <div className="flex justify-between border-b border-slate-50 pb-3">
                                            <span className="text-xs font-bold text-slate-400 flex items-center gap-1"><Icon name="calendar" size={12}/> {new Date(r.date).toLocaleDateString()}</span>
                                            <span className="bg-slate-900 text-white px-4 py-1 rounded-full text-xs font-black tracking-tighter">{r.weight} kg</span>
                                        </div>
                                        <div className="grid grid-cols-3 gap-3">
                                            <div className="p-3 bg-slate-50 rounded-2xl text-center">
                                                <p className="text-[8px] font-black text-slate-400 uppercase mb-1">GRASA</p>
                                                <p className="text-sm font-black text-slate-700">{r.fat}%</p>
                                                <p className={`text-[9px] font-bold ${fat.color}`}>{fat.label}</p>
                                            </div>
                                            <div className="p-3 bg-slate-50 rounded-2xl text-center">
                                                <p className="text-[8px] font-black text-slate-400 uppercase mb-1">MÚSCULO</p>
                                                <p className="text-sm font-black text-slate-700">{r.muscle}%</p>
                                                <p className={`text-[9px] font-bold ${musc.color}`}>{musc.label}</p>
                                            </div>
                                            <div className="p-3 bg-slate-50 rounded-2xl text-center">
                                                <p className="text-[8px] font-black text-slate-400 uppercase mb-1">VISCERAL</p>
                                                <p className="text-sm font-black text-slate-700">{r.visceral}</p>
                                                <p className={`text-[9px] font-bold ${visc.color}`}>{visc.label}</p>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            {records.length === 0 && <div className="text-center py-20 bg-white rounded-[2.5rem] border-2 border-dashed border-slate-200">
                                <Icon name="scale" size={48} className="mx-auto text-slate-200 mb-4" />
                                <p className="text-slate-400 font-bold">Sin evaluaciones</p>
                            </div>}
                        </div>
                    </div>
                );
            };

            const AssessmentForm = () => (
                <div className="p-4 space-y-6">
                    <button onClick={() => setView('history')} className="p-2"><Icon name="arrow-left" /></button>
                    <div className="px-2">
                        <h2 className="text-xl font-bold">Nueva Evaluación</h2>
                        <p className="text-xs text-blue-600 font-bold uppercase">{selectedClient.name}</p>
                    </div>
                    <form className="bg-white p-7 rounded-[2.5rem] border border-slate-100 shadow-2xl space-y-5" onSubmit={async (e) => {
                        e.preventDefault();
                        const d = new FormData(e.target);
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('clients').doc(selectedClient.id).collection('assessments').add({
                            weight: d.get('weight'), fat: d.get('fat'), muscle: d.get('muscle'), visceral: d.get('visceral'), date: new Date().toISOString()
                        });
                        setView('history');
                    }}>
                        <div className="grid grid-cols-2 gap-5">
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Peso (kg)</label>
                                <input name="weight" required type="number" step="0.1" className="w-full p-4 bg-slate-50 rounded-2xl
