<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriTrack | Club de Bienestar 🌿</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0fdf4; -webkit-tap-highlight-color: transparent; }
        .vista { display: none; }
        .vista.activa { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* AJUSTE DE IMPRESION - VERSION CORREGIDA */
        @media print {
            @page { size: portrait; margin: 1cm; }
            body { background: white !important; font-size: 12pt !important; color: black !important; padding: 0 !important; }
            nav, button, #loader, .no-print { display: none !important; }
            .print-only { display: block !important; }
            .card-shadow { 
                box-shadow: none !important; 
                border: 2px solid #e2e8f0 !important; 
                page-break-inside: avoid; 
                margin-bottom: 20px !important; 
                padding: 20px !important; 
                border-radius: 15px !important;
                width: 100% !important;
            }
            main { max-width: 100% !important; width: 100% !important; margin: 0 !important; }
            .val-big { font-size: 22pt !important; font-weight: 800 !important; }
            .label-big { font-size: 11pt !important; font-weight: 900 !important; border: 2px solid currentColor !important; padding: 2px 8px !important; border-radius: 8px !important; display: inline-block; }
            .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
        }
    </style>
</head>
<body class="text-slate-800 pb-32">

    <!-- Pantalla de Carga -->
    <div id="loader" class="fixed inset-0 z-[100] bg-emerald-900 flex flex-col items-center justify-center text-white">
        <div class="w-12 h-12 border-4 border-emerald-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h1 class="font-bold text-xl tracking-tighter uppercase italic text-white">Nutri-Track 🌿</h1>
        <button onclick="mostrarApp()" class="mt-10 px-10 py-4 bg-emerald-500 text-white rounded-full font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-transform cursor-pointer">
            ENTRAR AL CLUB ⚡
        </button>
    </div>

    <main id="app-ui" class="max-w-md mx-auto hidden">
        
        <!-- DASHBOARD -->
        <section id="view-home" class="vista activa p-4 space-y-6">
            <header class="bg-gradient-to-br from-emerald-600 to-teal-700 text-white p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h1 class="text-2xl font-extrabold italic text-white">¡Hola Club! 👋</h1>
                    <p class="text-emerald-100 text-xs mt-1 font-bold">Bienvenidos a su espacio de bienestar</p>
                </div>
                <i data-lucide="leaf" class="absolute -right-4 -top-4 opacity-20 w-32 h-32 rotate-12 text-white"></i>
            </header>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="irA('view-list')" class="p-6 bg-white rounded-[2rem] flex flex-col items-center border border-emerald-100 shadow-sm active:scale-95 transition">
                    <div class="p-3 bg-emerald-50 text-emerald-600 rounded-2xl mb-2"><i data-lucide="users"></i></div>
                    <span class="font-bold text-[10px] uppercase text-slate-500 tracking-widest">Socios</span>
                </button>
                <button onclick="irA('view-new')" class="p-6 bg-white rounded-[2rem] flex flex-col items-center border border-emerald-100 shadow-sm active:scale-95 transition">
                    <div class="p-3 bg-orange-50 text-orange-500 rounded-2xl mb-2"><i data-lucide="user-plus"></i></div>
                    <span class="font-bold text-[10px] uppercase text-slate-500 tracking-widest">Nuevo</span>
                </button>
            </div>
        </section>

        <!-- DIRECTORIO -->
        <section id="view-list" class="vista p-4 space-y-4">
            <div class="flex items-center gap-4">
                <button onclick="irA('view-home')" class="p-2 bg-white rounded-xl border border-emerald-100"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
                <h2 class="text-xl font-extrabold text-emerald-900 uppercase italic">Directorio</h2>
            </div>
            <div id="cont-clientes" class="space-y-3"></div>
        </section>

        <!-- REGISTRO -->
        <section id="view-new" class="vista p-4 space-y-4">
            <button onclick="irA('view-home')"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
            <h2 class="text-xl font-extrabold text-emerald-900 px-2 uppercase italic text-center">Registro</h2>
            <form id="form-new" class="bg-white p-8 rounded-[2.5rem] border border-emerald-100 space-y-5 shadow-lg">
                <input id="nc-name" required placeholder="Nombre del Socio" class="w-full p-4 bg-emerald-50/30 rounded-2xl border-none font-bold outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input id="nc-age" required type="number" placeholder="Edad" class="w-full p-4 bg-emerald-50/30 rounded-2xl border-none font-bold">
                    <select id="nc-gender" class="w-full p-4 bg-emerald-50/30 rounded-2xl border-none font-bold text-slate-500">
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-bold uppercase shadow-xl">Guardar Socio</button>
            </form>
        </section>

        <!-- EXPEDIENTE -->
        <section id="view-history" class="vista p-4 space-y-6">
            <div class="no-print space-y-4">
                <div class="flex items-center justify-between px-2">
                    <button onclick="irA('view-list')" class="p-2 bg-white rounded-xl border border-emerald-100"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
                    <div class="text-center">
                        <h2 id="hist-name" class="font-extrabold text-emerald-900 leading-none">Socio</h2>
                        <span class="text-[9px] font-bold text-emerald-400 uppercase mt-1 block">Expediente Compartido</span>
                    </div>
                    <button onclick="irA('view-eval')" class="bg-orange-500 text-white p-3 rounded-2xl shadow-lg active:scale-90 transition"><i data-lucide="plus" size="20"></i></button>
                </div>
                <button onclick="window.print()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-3 shadow-md active:scale-95 transition">
                    <i data-lucide="printer" size="20"></i> Imprimir Reporte para Socio
                </button>
            </div>
            
            <div class="hidden print-only text-center mb-6 border-b-4 border-emerald-500 pb-4">
                <h1 class="text-2xl font-black text-emerald-800 uppercase italic">REPORTE DE BIENESTAR 🌿</h1>
                <div id="print-header" class="mt-4 p-4 bg-emerald-50 rounded-2xl text-sm font-black text-emerald-900 border-2 border-emerald-100"></div>
            </div>
            <div id="hist-lista" class="space-y-6"></div>
        </section>

        <!-- EVALUACION -->
        <section id="view-eval" class="vista p-4 space-y-6">
            <button onclick="irA('view-history')"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
            <h2 class="text-xl font-extrabold text-emerald-900 px-2 uppercase italic text-center">Nueva Medición</h2>
            <form id="form-eval" class="bg-white p-8 rounded-[3rem] border border-emerald-100 space-y-4 shadow-xl">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">Talla (cm)</label>
                        <input id="ev-talla" required type="number" placeholder="Ej. 175" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold border-none">
                    </div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">Peso (kg)</label><input id="ev-peso" required type="number" step="0.1" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">% Grasa (GC)</label><input id="ev-grasa" required type="number" step="0.1" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">% Músculo (MM)</label><input id="ev-musculo" required type="number" step="0.1" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">Metabolismo (MB)</label><input id="ev-metab" required type="number" placeholder="kcal" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">Edad Bio.</label><input id="ev-bio" required type="number" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div class="col-span-2"><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">Grasa Visceral</label><input id="ev-visc" required type="number" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-bold uppercase shadow-xl mt-2">Guardar Evaluación</button>
            </form>
        </section>

        <!-- NAV -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/95 backdrop-blur border border-emerald-100 px-8 py-5 flex justify-between rounded-[2.5rem] shadow-2xl z-50 no-print">
            <button onclick="irA('view-home')"><i data-lucide="home" class="text-slate-400"></i></button>
            <button onclick="irA('view-list')"><i data-lucide="clipboard-list" class="text-slate-400"></i></button>
            <button onclick="irA('view-new')"><i data-lucide="user-plus" class="text-slate-400"></i></button>
        </nav>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCZVlrXMmFVaN1SfG4VZq1JLnvbRhzhGDc",
            authDomain: "body-track-3ff2b.firebaseapp.com",
            projectId: "body-track-3ff2b",
            storageBucket: "body-track-3ff2b.firebasestorage.app",
            messagingSenderId: "147768216670",
            appId: "1:147768216670:web:d25a81b41a60b99121f8cf"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const path = db.collection('artifacts').doc('body-track-3ff2b').collection('public').doc('data').collection('clients');

        let selId = null, selData = null;

        function getDiag(tipo, val, edad, sexo) {
            const v = parseFloat(val);
            if (tipo === 'imc') {
                if (v < 18.5) return { l: 'Bajo', c: 'text-blue-500' };
                if (v < 25) return { l: 'Normal', c: 'text-blue-600' };
                if (v < 30) return { l: 'Alto', c: 'text-orange-500' };
                return { l: 'Riesgo', c: 'text-red-600' };
            }
            if (tipo === 'grasa') {
                const isM = sexo === 'Masculino';
                const n = edad < 30 ? (isM ? 18 : 21) : (isM ? 23 : 26);
                const a = edad < 30 ? (isM ? 21 : 24) : (isM ? 26 : 29);
                if (v <= n) return { l: 'Normal', c: 'text-blue-600' };
                if (v <= a) return { l: 'Alto', c: 'text-orange-500' };
                return { l: 'Riesgo', c: 'text-red-600' };
            }
            if (tipo === 'visc') {
                if (v <= 9) return { l: 'Normal', c: 'text-blue-600' };
                if (v <= 14) return { l: 'Alto', c: 'text-orange-500' };
                return { l: 'Riesgo', c: 'text-red-600' };
            }
            return { l: 'Normal', c: 'text-blue-600' };
        }

        function irA(id) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
            const t = document.getElementById(id); if(t) t.classList.add('activa');
            if(id === 'view-list') renderLista();
            window.scrollTo(0,0);
        }

        function mostrarApp() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app-ui').style.display = 'block';
            lucide.createIcons();
            firebase.auth().signInAnonymously().catch(e => console.log("Login fail"));
        }

        document.getElementById('form-new').onsubmit = async (e) => {
            e.preventDefault();
            await path.add({
                name: document.getElementById('nc-name').value,
                age: parseInt(document.getElementById('nc-age').value),
                gender: document.getElementById('nc-gender').value,
                date: new Date().toISOString()
            });
            irA('view-list');
        };

        async function renderLista() {
            const cont = document.getElementById('cont-clientes');
            cont.innerHTML = '<p class="text-center py-10 opacity-30 font-black text-xs animate-pulse">Buscando socios...</p>';
            const snap = await path.orderBy('name').get();
            cont.innerHTML = '';
            snap.forEach(doc => {
                const c = doc.data();
                const d = document.createElement('div');
                d.className = "p-5 bg-white rounded-[2rem] border border-emerald-50 flex justify-between items-center shadow-sm active:scale-95 transition cursor-pointer";
                d.innerHTML = `<div class="flex items-center gap-4"><div class="w-10 h-10 bg-emerald-100 text-emerald-700 rounded-xl flex items-center justify-center font-bold italic">${c.name.charAt(0)}</div><div><h3 class="font-bold text-sm text-slate-700">${c.name}</h3><p class="text-[9px] text-emerald-500 font-bold uppercase tracking-wider">${c.gender} • ${c.age} años</p></div></div><i data-lucide="chevron-right" class="text-emerald-100"></i>`;
                d.onclick = () => { selId = doc.id; selData = c; renderHistorial(); };
                cont.appendChild(d);
            });
            lucide.createIcons();
        }

        async function renderHistorial() {
            irA('view-history');
            document.getElementById('hist-name').innerText = selData.name;
            document.getElementById('print-header').innerText = `SOCIO: ${selData.name.toUpperCase()} | EDAD: ${selData.age} | SEXO: ${selData.gender.toUpperCase()}`;
            const lista = document.getElementById('hist-lista');
            lista.innerHTML = '<p class="text-center py-10 opacity-30 text-xs uppercase font-black">Cargando...</p>';
            const snap = await path.doc(selId).collection('evals').orderBy('date', 'desc').get();
            lista.innerHTML = '';
            snap.forEach(doc => {
                const r = doc.data();
                const imcV = (r.weight / ((r.height/100)*(r.height/100))).toFixed(1);
                const dIMC = getDiag('imc', imcV);
                const dGC = getDiag('grasa', r.fat, selData.age, selData.gender);
                const dV = getDiag('visc', r.visceral);
                const d = document.createElement('div');
                d.className = "bg-white p-6 rounded-[2rem] border border-emerald-50 card-shadow space-y-4 print:p-6 print:border-2";
                d.innerHTML = `
                    <div class="flex justify-between border-b border-emerald-50 pb-2 items-center">
                        <span class="text-[10px] font-black text-emerald-400 uppercase tracking-widest print:text-lg">${new Date(r.date).toLocaleDateString()}</span>
                        <span class="text-emerald-700 font-black bg-emerald-50 px-4 py-1 rounded-full text-sm print:text-xl print:bg-white print:border-2">${r.weight} KG</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="p-3 bg-slate-50 rounded-2xl print:border">
                            <p class="text-[8px] font-bold text-slate-400 uppercase print:text-sm">IMC</p>
                            <p class="text-sm font-black text-slate-800 leading-none val-big print:text-2xl">${imcV}</p>
                            <p class="text-[9px] font-black ${dIMC.c} uppercase label-big print:text-lg">${dIMC.l}</p>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-2xl print:border">
                            <p class="text-[8px] font-bold text-slate-400 uppercase print:text-sm">% GRASA</p>
                            <p class="text-sm font-black text-slate-800 leading-none val-big print:text-2xl">${r.fat}%</p>
                            <p class="text-[9px] font-black ${dGC.c} uppercase label-big print:text-lg">${dGC.l}</p>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-2xl print:border">
                            <p class="text-[8px] font-bold text-slate-400 uppercase print:text-sm">% MÚSCULO</p>
                            <p class="text-sm font-black text-slate-800 leading-none val-big print:text-2xl">${r.muscle}%</p>
                            <p class="text-[9px] font-black text-blue-600 uppercase label-big print:text-lg">Normal</p>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-2xl print:border">
                            <p class="text-[8px] font-bold text-slate-400 uppercase print:text-sm">G. VISCERAL</p>
                            <p class="text-sm font-black text-slate-800 leading-none val-big print:text-2xl">${r.visceral}</p>
                            <p class="text-[9px] font-black ${dV.c} uppercase label-big print:text-lg">${dV.l}</p>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-2xl print:border">
                            <p class="text-[8px] font-bold text-slate-400 uppercase print:text-sm">METABOLISMO</p>
                            <p class="text-sm font-black text-slate-800 leading-none val-big print:text-2xl">${r.metabolism || '-'}</p>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-2xl print:border">
                            <p class="text-[8px] font-bold text-slate-400 uppercase print:text-sm">EDAD BIO.</p>
                            <p class="text-sm font-black text-slate-800 leading-none val-big print:text-2xl">${r.bioAge || '-'}</p>
                        </div>
                        <div class="p-4 bg-emerald-50/50 rounded-2xl col-span-2 bo
