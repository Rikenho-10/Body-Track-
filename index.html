<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutriTrack | Club de Bienestar 🌿</title>
    <!-- Estilos Rápidos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK Clásico (El que NO falla) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0fdf4; -webkit-tap-highlight-color: transparent; }
        .vista { display: none; }
        .vista.activa { display: block; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        
        /* Estilos de Impresión */
        @media print {
            body { background: white !important; padding: 0 !important; }
            nav, button, #loader, .no-print { display: none !important; }
            .print-only { display: block !important; }
            .card-shadow { box-shadow: none !important; border: 1px solid #eee !important; page-break-inside: avoid; }
            main { max-width: 100% !important; margin: 0 !important; width: 100% !important; }
            .text-emerald-600 { color: #059669 !important; }
        }
    </style>
</head>
<body class="text-slate-800 pb-32">

    <!-- Pantalla de Carga -->
    <div id="loader" class="fixed inset-0 z-[100] bg-emerald-900 flex flex-col items-center justify-center text-white">
        <div class="w-12 h-12 border-4 border-emerald-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h1 class="font-bold text-xl tracking-tighter uppercase">Nutri-Track 🌿</h1>
        <p class="text-emerald-300 text-[10px] uppercase font-bold tracking-widest mt-2">Iniciando Club...</p>
    </div>

    <main id="app-ui" class="max-w-md mx-auto hidden">
        
        <!-- DASHBOARD -->
        <section id="view-home" class="vista activa p-4 space-y-6">
            <header class="bg-gradient-to-br from-emerald-600 to-teal-700 text-white p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h1 class="text-2xl font-extrabold italic">¡Hola Club! 👋</h1>
                    <p class="text-emerald-100 text-xs mt-1">Bienvenidos a su espacio de bienestar</p>
                </div>
                <i data-lucide="leaf" class="absolute -right-4 -top-4 opacity-20 w-32 h-32 rotate-12 text-white"></i>
            </header>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="irA('view-list')" class="p-6 bg-white rounded-[2rem] border border-emerald-100 flex flex-col items-center card-shadow active:scale-95 transition">
                    <div class="p-3 bg-emerald-50 text-emerald-600 rounded-2xl mb-2"><i data-lucide="users"></i></div>
                    <span class="font-bold text-[10px] uppercase text-slate-500">Socios</span>
                </button>
                <button onclick="irA('view-new')" class="p-6 bg-white rounded-[2rem] border border-emerald-100 flex flex-col items-center card-shadow active:scale-95 transition">
                    <div class="p-3 bg-orange-50 text-orange-500 rounded-2xl mb-2"><i data-lucide="user-plus"></i></div>
                    <span class="font-bold text-[10px] uppercase text-slate-500">Nuevo</span>
                </button>
            </div>
        </section>

        <!-- DIRECTORIO -->
        <section id="view-list" class="vista p-4 space-y-4">
            <div class="flex items-center gap-4">
                <button onclick="irA('view-home')" class="p-2 bg-white rounded-xl border shadow-sm"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
                <h2 class="text-xl font-extrabold text-emerald-900 uppercase italic">Directorio</h2>
            </div>
            <div id="cont-clientes" class="space-y-3"></div>
        </section>

        <!-- NUEVO SOCIO -->
        <section id="view-new" class="vista p-4 space-y-4">
            <button onclick="irA('view-home')"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
            <h2 class="text-xl font-extrabold text-emerald-900 px-2 uppercase italic text-center">Registro</h2>
            <form id="form-new-client" class="bg-white p-8 rounded-[2.5rem] border border-emerald-100 space-y-5 card-shadow">
                <input id="nc-name" required placeholder="Nombre del Socio" class="w-full p-4 bg-emerald-50/30 rounded-2xl border-none font-bold outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input id="nc-age" required type="number" placeholder="Edad" class="w-full p-4 bg-emerald-50/30 rounded-2xl border-none font-bold">
                    <select id="nc-gender" class="w-full p-4 bg-emerald-50/30 rounded-2xl border-none font-bold text-slate-500">
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-bold uppercase tracking-widest shadow-lg">Guardar Socio</button>
            </form>
        </section>

        <!-- HISTORIAL -->
        <section id="view-history" class="vista p-4 space-y-6">
            <div class="flex flex-col space-y-4 no-print">
                <div class="flex items-center justify-between px-2">
                    <button onclick="irA('view-list')" class="p-2 bg-white rounded-xl border border-emerald-100"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
                    <div class="text-center">
                        <h2 id="hist-name" class="font-extrabold text-emerald-900 leading-none">Cargando...</h2>
                        <span class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest mt-1 block">Evolución Corporal</span>
                    </div>
                    <button onclick="irA('view-eval')" class="bg-orange-500 text-white p-3 rounded-2xl shadow-lg active:scale-90 transition"><i data-lucide="plus" size="20"></i></button>
                </div>
                <!-- BOTÓN IMPRIMIR -->
                <button onclick="window.print()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest flex items-center justify-center gap-3 active:scale-95 transition">
                    <i data-lucide="printer" size="18"></i> Imprimir Reporte
                </button>
            </div>

            <!-- Título para Impresión -->
            <div class="hidden print-only text-center mb-8 border-b-4 border-emerald-500 pb-6">
                <h1 class="text-3xl font-black text-emerald-800 uppercase italic">REPORTE DE BIENESTAR 🌿</h1>
                <div id="print-header" class="mt-4 p-4 bg-emerald-50 rounded-2xl text-sm font-black text-emerald-900 border border-emerald-100"></div>
            </div>

            <div id="hist-lista" class="space-y-6"></div>
        </section>

        <!-- EVALUACIÓN -->
        <section id="view-eval" class="vista p-4 space-y-6">
            <button onclick="irA('view-history')"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
            <h2 class="text-xl font-extrabold text-emerald-900 px-2 uppercase italic text-center">Nueva Medición</h2>
            <form id="form-assessment" class="bg-white p-8 rounded-[3rem] border border-emerald-100 space-y-4 card-shadow">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">Talla (cm)</label>
                        <input id="ev-talla" required type="number" placeholder="Ej. 170" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold">
                    </div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">Peso (kg)</label><input id="ev-peso" required type="number" step="0.1" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">% GC (Grasa)</label><input id="ev-grasa" required type="number" step="0.1" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">% MM (Músculo)</label><input id="ev-musculo" required type="number" step="0.1" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">MB (Metabolismo)</label><input id="ev-metab" required type="number" placeholder="kcal" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">Edad Bio.</label><input id="ev-bio" required type="number" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div class="col-span-2"><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase block">Grasa Visceral</label><input id="ev-visc" required type="number" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-bold uppercase tracking-widest shadow-xl mt-2">Guardar Evaluación</button>
            </form>
        </section>

        <!-- NAV -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass border border-emerald-100 px-8 py-5 flex justify-between rounded-[2.5rem] shadow-2xl z-50 no-print">
            <button onclick="irA('view-home')"><i data-lucide="home" class="text-slate-400"></i></button>
            <button onclick="irA('view-list')"><i data-lucide="clipboard-list" class="text-slate-400"></i></button>
            <button onclick="irA('view-new')"><i data-lucide="user-plus" class="text-slate-400"></i></button>
        </nav>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCZVlrXMmFVaN1SfG4VZq1JLnvbRhzhGDc",
            authDomain: "body-track-3ff2b.firebaseapp.com",
            projectId: "body-track-3ff2b",
            storageBucket: "body-track-3ff2b.firebasestorage.app",
            messagingSenderId: "147768216670",
            appId: "1:147768216670:web:d25a81b41a60b99121f8cf"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        const clientsRef = db.collection('artifacts').doc('body-track-3ff2b').collection('public').doc('data').collection('clients');

        let selId = null, selData = null;

        function irA(id) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            if(id === 'view-list') renderLista();
            window.scrollTo(0,0);
        }

        window.onload = () => {
            firebase.auth().signInAnonymously().then(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-ui').style.display = 'block';
                lucide.createIcons();
            });
            // Por si acaso, forzar salida del loader después de 5 seg
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-ui').style.display = 'block';
                lucide.createIcons();
            }, 5000);
        };

        // --- FUNCIONES DB ---
        document.getElementById('form-new-client').onsubmit = async (e) => {
            e.preventDefault();
            await clientsRef.add({
                name: document.getElementById('nc-name').value,
                age: parseInt(document.getElementById('nc-age').value),
                gender: document.getElementById('nc-gender').value,
                date: new Date().toISOString()
            });
            e.target.reset();
            irA('view-list');
        };

        async function renderLista() {
            const cont = document.getElementById('cont-clientes');
            cont.innerHTML = '<p class="text-center py-10 opacity-50 uppercase text-[10px] font-bold">Sincronizando Club...</p>';
            const snap = await clientsRef.orderBy('name').get();
            cont.innerHTML = '';
            snap.forEach(doc => {
                const c = doc.data();
                const d = document.createElement('div');
                d.className = "p-5 bg-white rounded-[2rem] border border-emerald-50 flex justify-between items-center shadow-sm active:scale-95 transition cursor-pointer";
                d.innerHTML = `<div class="flex items-center gap-4"><div class="w-10 h-10 bg-emerald-100 text-emerald-700 rounded-xl flex items-center justify-center font-bold italic">${c.name.charAt(0)}</div><div><h3 class="font-bold text-sm">${c.name}</h3><p class="text-[9px] text-emerald-500 font-bold uppercase">${c.gender} • ${c.age} años</p></div></div><i data-lucide="chevron-right" class="text-emerald-100"></i>`;
                d.onclick = () => { selId = doc.id; selData = c; renderHistorial(); };
                cont.appendChild(d);
            });
            lucide.createIcons();
        }

        async function renderHistorial() {
            irA('view-history');
            document.getElementById('hist-name').innerText = selData.name;
            document.getElementById('print-header').innerText = `SOCIO: ${selData.name.toUpperCase()} | EDAD: ${selData.age} | SEXO: ${selData.gender.toUpperCase()}`;
            const lista = document.getElementById('hist-lista');
            lista.innerHTML = '<p class="text-center py-10 opacity-30 text-xs">Abriendo expediente compartido...</p>';
            const snap = await clientsRef.doc(selId).collection('evals').orderBy('date', 'desc').get();
            lista.innerHTML = '';
            snap.forEach(doc => {
                const r = doc.data();
                const imc = (r.weight / ((r.height/100)*(r.height/100))).toFixed(1);
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2.5rem] border border-emerald-50 card-shadow space-y-4";
                div.innerHTML = `
                    <div class="flex justify-between border-b border-emerald-50 pb-3 items-center">
                        <span class="text-[10px] font-bold text-emerald-300 uppercase tracking-widest">${new Date(r.date).toLocaleDateString()}</span>
                        <span class="text-emerald-700 font-extrabold bg-emerald-50 px-4 py-1 rounded-full text-xs">${r.weight} KG</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">IMC</p><p class="text-xs font-black text-slate-700 leading-none">${imc}</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">% GC</p><p class="text-xs font-black text-slate-700 leading-none">${r.fat}%</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">% MM</p><p class="text-xs font-black text-slate-700 leading-none">${r.muscle}%</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">MB</p><p class="text-xs font-black text-slate-700 leading-none">${r.metabolism || '-'}</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">EDAD BIO</p><p class="text-xs font-black text-slate-700 leading-none">${r.bioAge || '-'}</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">G. VISCERAL</p><p class="text-xs font-black text-slate-700 leading-none">${r.visceral}</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl col-span-2"><p class="text-[8px] font-bold text-slate-400 uppercase">TALLA</p><p class="text-xs font-black text-slate-700 leading-none">${r.height} cm</p></div>
                    </div>`;
                lista.appendChild(div);
            });
            if(snap.empty) lista.innerHTML = '<p class="text-center py-20 text-xs font-bold text-emerald-200 uppercase tracking-widest">Sin mediciones aún</p>';
            lucide.createIcons();
        }

        document.getElementById('form-assessment').onsubmit = async (e) => {
            e.preventDefault();
            await clientsRef.doc(selId).collection('evals').add({
                weight: parseFloat(document.getElementById('ev-peso').value),
                height: parseFloat(document.getElementById('ev-talla').value),
                fat: parseFloat(document.getElementById('ev-grasa').value),
                muscle: parseFloat(document.getElementById('ev-musculo').value),
                visceral: parseInt(document.getElementById('ev-visc').value),
                metabolism: parseInt(document.getElementById('ev-metab').value),
                bioAge: parseInt(document.getElementById('ev-bio').value),
                date: new Date().toISOString()
            });
            e.target.reset();
            renderHistorial();
        };
    </script>
</body>
</html>
