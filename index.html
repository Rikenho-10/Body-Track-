<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>NutriTrack | Club de Bienestar 🌿</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0fdf4; -webkit-tap-highlight-color: transparent; }
        .vista { display: none; }
        .vista.activa { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        input:focus, select:focus { border-color: #10b981 !important; outline: none; }
    </style>
</head>
<body class="text-slate-800 pb-32">

    <!-- Pantalla de Carga -->
    <div id="loader" class="fixed inset-0 z-[100] bg-emerald-900 flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-emerald-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <h1 class="font-bold text-xl tracking-tighter uppercase italic">Nutri-Track 🌿</h1>
        <button id="btn-forzar" onclick="forzarEntrada()" class="mt-8 px-6 py-2 bg-emerald-500 rounded-full text-[10px] font-black uppercase tracking-widest hidden">Entrar Manual ⚡</button>
    </div>

    <main id="app-ui" class="max-w-md mx-auto hidden">
        
        <!-- INICIO -->
        <section id="view-home" class="vista activa p-4 space-y-6">
            <header class="bg-gradient-to-br from-emerald-600 to-teal-700 text-white p-8 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h1 class="text-2xl font-extrabold italic">¡Hola Club! 👋</h1>
                    <p class="text-emerald-100 text-xs mt-1">Bienvenidos a su espacio de bienestar</p>
                </div>
                <i data-lucide="leaf" class="absolute -right-4 -top-4 opacity-20 w-32 h-32 rotate-12"></i>
            </header>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="irA('view-list')" class="p-6 bg-white rounded-[2rem] border border-emerald-100 flex flex-col items-center card-shadow active:scale-95 transition">
                    <div class="p-3 bg-emerald-50 text-emerald-600 rounded-2xl mb-2"><i data-lucide="users"></i></div>
                    <span class="font-bold text-[10px] uppercase text-slate-500">Socios</span>
                </button>
                <button onclick="irA('view-new')" class="p-6 bg-white rounded-[2rem] border border-emerald-100 flex flex-col items-center card-shadow active:scale-95 transition">
                    <div class="p-3 bg-orange-50 text-orange-500 rounded-2xl mb-2"><i data-lucide="user-plus"></i></div>
                    <span class="font-bold text-[10px] uppercase text-slate-500">Nuevo</span>
                </button>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] border border-emerald-100 card-shadow">
                <h2 class="text-[10px] font-black uppercase text-emerald-600 mb-4 tracking-widest flex items-center gap-2">
                    <i data-lucide="sparkles" size="14"></i> Actividad Reciente
                </h2>
                <div id="recientes" class="space-y-3">
                    <div class="h-10 bg-slate-50 rounded-xl animate-pulse"></div>
                </div>
            </div>
        </section>

        <!-- DIRECTORIO -->
        <section id="view-list" class="vista p-4 space-y-4">
            <div class="flex items-center gap-4">
                <button onclick="irA('view-home')" class="p-2 bg-white rounded-xl border border-emerald-100 shadow-sm"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
                <h2 class="text-xl font-extrabold text-emerald-900 italic uppercase">Socios</h2>
            </div>
            <div id="cont-clientes" class="space-y-3"></div>
        </section>

        <!-- REGISTRO -->
        <section id="view-new" class="vista p-4 space-y-4">
            <button onclick="irA('view-home')"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
            <h2 class="text-xl font-extrabold text-emerald-900 px-2 uppercase italic">Alta de Socio</h2>
            <form onsubmit="registrarSocio(event)" class="bg-white p-8 rounded-[2.5rem] border border-emerald-100 space-y-5 card-shadow">
                <input id="reg-nom" required placeholder="Nombre Completo" class="w-full p-4 bg-emerald-50/30 rounded-2xl border-none font-bold outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input id="reg-eda" required type="number" placeholder="Edad" class="w-full p-4 bg-emerald-50/30 rounded-2xl border-none font-bold">
                    <select id="reg-sex" class="w-full p-4 bg-emerald-50/30 rounded-2xl border-none font-bold text-slate-500">
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-bold uppercase tracking-widest shadow-lg shadow-emerald-100">Guardar Registro</button>
            </form>
        </section>

        <!-- EXPEDIENTE -->
        <section id="view-history" class="vista p-4 space-y-6">
            <div class="flex items-center justify-between px-2">
                <button onclick="irA('view-list')" class="p-2 bg-white rounded-xl border border-emerald-100"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
                <div class="text-center">
                    <h2 id="hist-nom" class="font-extrabold text-emerald-900 leading-none">Socio</h2>
                    <span id="hist-meta" class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest mt-1 block">Evolución</span>
                </div>
                <button onclick="irA('view-eval')" class="bg-orange-500 text-white p-3 rounded-2xl shadow-lg active:scale-90 transition"><i data-lucide="plus"></i></button>
            </div>
            <div id="hist-lista" class="space-y-5"></div>
        </section>

        <!-- EVALUACIÓN -->
        <section id="view-eval" class="vista p-4 space-y-6">
            <button onclick="irA('view-history')"><i data-lucide="arrow-left" class="text-emerald-600"></i></button>
            <h2 class="text-xl font-extrabold text-emerald-900 px-2 uppercase italic">Nueva Evaluación</h2>
            <form onsubmit="guardarEval(event)" class="bg-white p-8 rounded-[3rem] border border-emerald-100 space-y-6 card-shadow">
                <div class="grid grid-cols-2 gap-5">
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase mb-1 block">Peso (kg)</label><input id="ev-p" required type="number" step="0.1" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase mb-1 block">Talla (cm)</label><input id="ev-t" required type="number" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase mb-1 block">% Grasa</label><input id="ev-g" required type="number" step="0.1" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase mb-1 block">% Músculo</label><input id="ev-m" required type="number" step="0.1" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                    <div class="col-span-2"><label class="text-[9px] font-bold text-emerald-600 ml-2 uppercase mb-1 block">Grasa Visceral</label><input id="ev-v" required type="number" class="w-full p-4 bg-emerald-50/30 rounded-2xl outline-none font-bold"></div>
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white p-5 rounded-2xl font-bold uppercase tracking-widest shadow-xl">Calcular y Guardar</button>
            </form>
        </section>

        <!-- MENU -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] glass border border-emerald-100 px-8 py-5 flex justify-between rounded-[2.5rem] shadow-2xl z-50">
            <button onclick="irA('view-home')"><i data-lucide="home" class="text-slate-400"></i></button>
            <button onclick="irA('view-list')"><i data-lucide="clipboard-list" class="text-slate-400"></i></button>
            <button onclick="irA('view-new')"><i data-lucide="user-plus" class="text-slate-400"></i></button>
        </nav>
    </main>

    <script>
        const config = {
            apiKey: "AIzaSyCZVlrXMmFVaN1SfG4VZq1JLnvbRhzhGDc",
            authDomain: "body-track-3ff2b.firebaseapp.com",
            projectId: "body-track-3ff2b",
            storageBucket: "body-track-3ff2b.firebasestorage.app",
            messagingSenderId: "147768216670",
            appId: "1:147768216670:web:d25a81b41a60b99121f8cf"
        };
        firebase.initializeApp(config);
        const db = firebase.firestore();
        // Ruta Compartida para Ricardo y Esposa
        const baseRef = db.collection('artifacts').doc('body-track-3ff2b').collection('public').doc('data').collection('clients');

        let selId = null, selData = null;

        // --- DIAGNÓSTICOS ---
        function getStatus(tipo, val, edad, sexo) {
            const v = parseFloat(val);
            if (tipo === 'grasa') {
                const isM = sexo === 'Masculino';
                if (edad < 30) {
                    if (v <= (isM ? 11 : 14)) return { l: 'Fitness', c: 'text-emerald-500' };
                    if (v <= (isM ? 18 : 21)) return { l: 'Normal', c: 'text-green-500' };
                    return { l: 'Alta', c: 'text-rose-500' };
                } else {
                    if (v <= (isM ? 13 : 16)) return { l: 'Atleta', c: 'text-emerald-500' };
                    if (v <= (isM ? 23 : 26)) return { l: 'Normal', c: 'text-green-500' };
                    return { l: 'Alta', c: 'text-rose-500' };
                }
            }
            if (tipo === 'visc') {
                if (v <= 9) return { l: 'Saludable', c: 'text-emerald-500' };
                if (v <= 14) return { l: 'Nivel Alto', c: 'text-orange-500' };
                return { l: 'Riesgo', c: 'text-rose-600' };
            }
            return { l: '-', c: 'text-slate-400' };
        }

        // --- NAVEGACIÓN ---
        function irA(id) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
            document.getElementById(id).classList.add('activa');
            if(id === 'view-list') renderLista();
            if(id === 'view-home') renderRecientes();
            window.scrollTo(0,0);
        }

        function forzarEntrada() {
            document.getElementById('loader').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-ui').style.display = 'block';
                lucide.createIcons();
                renderRecientes();
            }, 500);
        }

        window.onload = () => {
            setTimeout(() => { document.getElementById('btn-forzar').classList.remove('hidden'); }, 4000);
            firebase.auth().signInAnonymously().then(() => { forzarEntrada(); });
        };

        // --- ACCIONES DB ---
        async function registrarSocio(e) {
            e.preventDefault();
            await baseRef.add({
                name: document.getElementById('reg-nom').value,
                age: parseInt(document.getElementById('reg-eda').value),
                gender: document.getElementById('reg-sex').value,
                date: new Date().toISOString()
            });
            e.target.reset();
            irA('view-list');
        }

        async function renderRecientes() {
            const snap = await baseRef.orderBy('date', 'desc').limit(3).get();
            const cont = document.getElementById('recientes');
            cont.innerHTML = '';
            snap.forEach(doc => {
                cont.innerHTML += `<div class="p-3 bg-emerald-50/50 rounded-2xl flex justify-between text-[11px] font-bold uppercase text-emerald-800">${doc.data().name} <span class="text-emerald-400">SOCIO</span></div>`;
            });
            if(snap.empty) cont.innerHTML = '<p class="text-center text-slate-300 py-2 italic">Sin registros.</p>';
            lucide.createIcons();
        }

        async function renderLista() {
            const cont = document.getElementById('cont-clientes');
            cont.innerHTML = '<div class="text-center py-10 text-emerald-500 animate-pulse font-bold text-xs uppercase">Sincronizando...</div>';
            const snap = await baseRef.orderBy('name').get();
            cont.innerHTML = '';
            snap.forEach(doc => {
                const c = doc.data();
                const div = document.createElement('div');
                div.className = "p-5 bg-white rounded-[2rem] border border-emerald-50 flex justify-between items-center card-shadow active:scale-95 transition cursor-pointer";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-100 text-emerald-700 rounded-xl flex items-center justify-center font-bold italic">${c.name.charAt(0)}</div>
                        <div>
                            <h3 class="font-bold text-slate-700 text-sm">${c.name}</h3>
                            <p class="text-[9px] text-emerald-500 font-bold uppercase">${c.gender} • ${c.age} años</p>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="text-emerald-100"></i>`;
                div.onclick = () => { selId = doc.id; selData = c; renderHistorial(); };
                cont.appendChild(div);
            });
            lucide.createIcons();
        }

        async function renderHistorial() {
            irA('view-history');
            document.getElementById('hist-nom').innerText = selData.name;
            const lista = document.getElementById('hist-lista');
            lista.innerHTML = '<p class="text-center py-10 text-xs opacity-30 italic">Abriendo expediente...</p>';
            const snap = await baseRef.doc(selId).collection('evals').orderBy('date', 'desc').get();
            lista.innerHTML = '';
            snap.forEach(doc => {
                const r = doc.data();
                const imc = (r.weight / ((r.height/100)*(r.height/100))).toFixed(1);
                const gStat = getStatus('grasa', r.fat, selData.age, selData.gender);
                const vStat = getStatus('visc', r.visceral);
                
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-[2.5rem] border border-emerald-50 card-shadow space-y-4";
                div.innerHTML = `
                    <div class="flex justify-between border-b border-emerald-50 pb-3 items-center">
                        <span class="text-[10px] font-bold text-emerald-300 uppercase tracking-widest">${new Date(r.date).toLocaleDateString()}</span>
                        <span class="text-emerald-700 font-extrabold bg-emerald-50 px-4 py-1 rounded-full text-xs">${r.weight} KG</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">IMC</p><p class="text-sm font-extrabold text-slate-700 leading-none">${imc}</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">GRASA</p><p class="text-sm font-extrabold text-slate-700 leading-none">${r.fat}%</p><p class="text-[8px] font-bold ${gStat.c} uppercase mt-1">${gStat.l}</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">MÚSCULO</p><p class="text-sm font-extrabold text-slate-700 leading-none">${r.muscle}%</p></div>
                        <div class="p-3 bg-slate-50 rounded-2xl"><p class="text-[8px] font-bold text-slate-400 uppercase">VISCERAL</p><p class="text-sm font-extrabold text-slate-700 leading-none">${r.visceral}</p><p class="text-[8px] font-bold ${vStat.c} uppercase mt-1">${vStat.l}</p></div>
                    </div>`;
                lista.appendChild(div);
            });
            if(snap.empty) lista.innerHTML = '<p class="text-center py-20 text-xs font-bold text-emerald-200 uppercase tracking-widest italic">Aún no hay mediciones</p>';
            lucide.createIcons();
        }

        async function guardarEval(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true; btn.innerText = 'PROCESANDO...';
            await baseRef.doc(selId).collection('evals').add({
                weight: parseFloat(document.getElementById('ev-p').value),
                height: parseFloat(document.getElementById('ev-t').value),
                fat: parseFloat(document.getElementById('ev-g').value),
                muscle: parseFloat(document.getElementById('ev-m').value),
                visceral: parseInt(document.getElementById('ev-v').value),
                date: new Date().toISOString()
            });
            btn.disabled = false; btn.innerText = 'CALCULAR Y GUARDAR';
            e.target.reset();
            renderHistorial();
        }
    </script>
</body>
</html>
